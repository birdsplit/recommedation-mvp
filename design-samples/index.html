<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>모두의침대 — 디자인 시안 비교</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: "Pretendard Variable", Pretendard, -apple-system, sans-serif;
      background: #ECEDEF;
      color: #191F28;
      min-height: 100vh;
      padding: 48px 24px;
    }
    .wrap { max-width: 860px; margin: 0 auto; }
    h1 { font-size: 28px; font-weight: 800; margin-bottom: 8px; }
    p.desc { color: #4E5968; font-size: 15px; margin-bottom: 36px; }
    .cards { display: grid; gap: 16px; }
    a.card {
      display: flex; align-items: center; justify-content: space-between;
      background: #fff; border-radius: 16px; padding: 24px 28px;
      text-decoration: none; color: inherit;
      border: 1px solid #E5E8EB;
      transition: transform .12s ease, box-shadow .12s ease;
    }
    a.card:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(0,0,0,.08); }
    .card b { font-size: 18px; display: block; margin-bottom: 4px; }
    .card span { color: #6B7684; font-size: 14px; }
    .chip {
      font-size: 13px; font-weight: 700; padding: 6px 14px; border-radius: 999px; white-space: nowrap;
    }
    .chip.a { background: #FFF0EB; color: #E85A38; }
    .chip.b { background: #E8F1FE; color: #1B6FE0; }
    .chip.c { background: #E7EFEB; color: #0E3B2E; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🛏️ 모두의침대 — 디자인 시안 3종</h1>
    <p class="desc">각 시안은 랜딩 화면과 추천 결과 화면을 같은 콘텐츠, 다른 스타일로 보여줍니다. 클릭해서 비교해 보세요.</p>
    <div class="cards">
      <a class="card" href="./a.html">
        <div><b>시안 A — 밝고 프렌들리 라운드형</b><span>웜 아이보리 배경 · 코랄 포인트 · 큰 라운드 카드 · 친근한 어조</span></div>
        <span class="chip a">보러 가기</span>
      </a>
      <a class="card" href="./b.html">
        <div><b>시안 B — 뉴트럴 유틸리티형 (토스풍)</b><span>흰 배경 · 블루 포인트 · 높은 정보 밀도 · 담백하고 신뢰감 있는 스타일</span></div>
        <span class="chip b">보러 가기</span>
      </a>
      <a class="card" href="./c.html">
        <div><b>시안 C — 딥컬러 전문가형</b><span>딥 포레스트 그린 · 세리프 헤드라인 · 차분한 프리미엄 의사결정 도구</span></div>
        <span class="chip c">보러 가기</span>
      </a>
    </div>
  </div>
</body>
</html>
